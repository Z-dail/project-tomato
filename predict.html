<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🍅 番茄病害智能诊断系统</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1000px;
            margin: 0 auto;
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
            overflow: hidden;
        }

        .header {
            background: linear-gradient(135deg, #4CAF50 0%, #45a049 100%);
            color: white;
            padding: 30px;
            text-align: center;
        }

        .header h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
        }

        .header p {
            font-size: 1.2em;
            opacity: 0.9;
        }

        .content {
            padding: 40px;
        }

        .upload-section {
            text-align: center;
            margin-bottom: 40px;
        }

        .upload-area {
            border: 3px dashed #4CAF50;
            border-radius: 15px;
            padding: 60px 20px;
            margin: 20px 0;
            cursor: pointer;
            transition: all 0.3s ease;
            background: #f8fff8;
        }

        .upload-area:hover {
            border-color: #45a049;
            background: #f0f8f0;
            transform: translateY(-2px);
        }

        .upload-area.dragover {
            border-color: #2196F3;
            background: #e3f2fd;
        }

        .upload-icon {
            font-size: 4em;
            color: #4CAF50;
            margin-bottom: 20px;
        }

        .upload-text {
            font-size: 1.3em;
            color: #666;
            margin-bottom: 10px;
        }

        .upload-hint {
            color: #999;
            font-size: 0.9em;
        }

        #fileInput {
            display: none;
        }

        .preview-section {
            text-align: center;
            margin: 30px 0;
            display: none;
        }

        .preview-container {
            position: relative;
            display: inline-block;
            border-radius: 10px;
            overflow: hidden;
            box-shadow: 0 10px 20px rgba(0,0,0,0.1);
        }

        #preview {
            max-width: 100%;
            max-height: 400px;
            display: block;
        }

        .predict-button {
            background: linear-gradient(135deg, #FF6B6B 0%, #FF8E53 100%);
            color: white;
            border: none;
            padding: 15px 40px;
            border-radius: 50px;
            font-size: 1.2em;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 5px 15px rgba(255, 107, 107, 0.4);
        }

        .predict-button:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(255, 107, 107, 0.6);
        }

        .predict-button:disabled {
            background: #ccc;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }

        .result-section {
            display: none;
            margin-top: 40px;
            padding: 30px;
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            border-radius: 15px;
        }

        .result-title {
            font-size: 1.8em;
            color: #333;
            margin-bottom: 20px;
            text-align: center;
        }

        .prediction-main {
            text-align: center;
            margin-bottom: 30px;
            padding: 20px;
            background: white;
            border-radius: 10px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }

        .prediction-label {
            font-size: 2em;
            font-weight: bold;
            color: #4CAF50;
            margin-bottom: 10px;
        }

        .prediction-confidence {
            font-size: 1.3em;
            color: #666;
        }

        .top3-section {
            margin-top: 20px;
        }

        .top3-title {
            font-size: 1.3em;
            color: #333;
            margin-bottom: 15px;
            text-align: center;
        }

        .top3-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 20px;
            margin: 8px 0;
            background: white;
            border-radius: 8px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
            transition: all 0.3s ease;
        }

        .top3-item:hover {
            transform: translateX(5px);
            box-shadow: 0 4px 10px rgba(0,0,0,0.15);
        }

        .top3-rank {
            font-weight: bold;
            color: #FF6B6B;
            margin-right: 10px;
        }

        .top3-class {
            flex-grow: 1;
            font-weight: 500;
        }

        .top3-confidence {
            color: #4CAF50;
            font-weight: bold;
        }

        .loading {
            display: none;
            text-align: center;
            margin: 20px 0;
        }

        .spinner {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #FF6B6B;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto 10px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .error-message {
            background: #ffebee;
            color: #c62828;
            padding: 15px;
            border-radius: 8px;
            margin: 20px 0;
            display: none;
            border-left: 4px solid #c62828;
        }

        .success-message {
            background: #e8f5e8;
            color: #2e7d32;
            padding: 15px;
            border-radius: 8px;
            margin: 20px 0;
            display: none;
            border-left: 4px solid #2e7d32;
        }

        @media (max-width: 768px) {
            .container {
                margin: 10px;
                border-radius: 15px;
            }

            .content {
                padding: 20px;
            }

            .header h1 {
                font-size: 2em;
            }

            .upload-area {
                padding: 40px 20px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🍅 番茄病害智能诊断系统</h1>
            <p>基于深度学习的番茄叶片病害识别与分类</p>
        </div>

        <div class="content">
            <div class="upload-section">
                <div class="upload-area" id="uploadArea" onclick="document.getElementById('fileInput').click()">
                    <div class="upload-icon">📸</div>
                    <div class="upload-text">点击或拖拽上传番茄叶片图像</div>
                    <div class="upload-hint">支持 JPG、PNG、JPEG 格式，建议图像尺寸不小于 224×224 像素</div>
                </div>
                <input type="file" id="fileInput" accept="image/*">
            </div>

            <div class="error-message" id="errorMessage"></div>
            <div class="success-message" id="successMessage"></div>

            <div class="preview-section" id="previewSection">
                <div class="preview-container">
                    <img id="preview" alt="预览图像">
                </div>
                <div style="text-align: center; margin-top: 20px;">
                    <button class="predict-button" onclick="predict()" id="predictBtn" disabled>
                        🔍 开始智能诊断
                    </button>
                </div>
            </div>

            <div class="loading" id="loading">
                <div class="spinner"></div>
                <p>正在进行智能分析，请稍候...</p>
            </div>

            <div class="result-section" id="resultSection">
                <h2 class="result-title">🎯 诊断结果</h2>

                <div class="prediction-main">
                    <div class="prediction-label" id="predictionLabel"></div>
                    <div class="prediction-confidence" id="predictionConfidence"></div>
                </div>

                <div class="top3-section">
                    <div class="top3-title">📊 可能性排名</div>
                    <div id="top3Results"></div>
                </div>
            </div>
        </div>
    </div>

    <script>
        let selectedFile = null;
        let isDragOver = false;

        // DOM元素
        const fileInput = document.getElementById('fileInput');
        const uploadArea = document.getElementById('uploadArea');
        const previewSection = document.getElementById('previewSection');
        const preview = document.getElementById('preview');
        const predictBtn = document.getElementById('predictBtn');
        const loading = document.getElementById('loading');
        const resultSection = document.getElementById('resultSection');
        const errorMessage = document.getElementById('errorMessage');
        const successMessage = document.getElementById('successMessage');

        // 显示消息
        function showMessage(message, type = 'error') {
            const messageEl = type === 'error' ? errorMessage : successMessage;
            const otherEl = type === 'error' ? successMessage : errorMessage;

            otherEl.style.display = 'none';
            messageEl.textContent = message;
            messageEl.style.display = 'block';

            if (type === 'success') {
                setTimeout(() => {
                    messageEl.style.display = 'none';
                }, 3000);
            }
        }

        // 隐藏消息
        function hideMessages() {
            errorMessage.style.display = 'none';
            successMessage.style.display = 'none';
        }

        // 文件选择处理
        fileInput.addEventListener('change', function(e) {
            if (e.target.files && e.target.files[0]) {
                handleFile(e.target.files[0]);
            }
        });

        // 拖拽处理
        uploadArea.addEventListener('dragover', (e) => {
            e.preventDefault();
            uploadArea.classList.add('dragover');
            isDragOver = true;
        });

        uploadArea.addEventListener('dragleave', (e) => {
            e.preventDefault();
            if (!uploadArea.contains(e.relatedTarget)) {
                uploadArea.classList.remove('dragover');
                isDragOver = false;
            }
        });

        uploadArea.addEventListener('drop', (e) => {
            e.preventDefault();
            uploadArea.classList.remove('dragover');
            isDragOver = false;

            if (e.dataTransfer.files && e.dataTransfer.files[0]) {
                const file = e.dataTransfer.files[0];
                if (file.type.startsWith('image/')) {
                    handleFile(file);
                } else {
                    showMessage('请上传图像文件！');
                }
            }
        });

        // 处理文件
        function handleFile(file) {
            selectedFile = file;
            hideMessages();

            // 显示预览
            const reader = new FileReader();
            reader.onload = function(e) {
                preview.src = e.target.result;
                previewSection.style.display = 'block';
                predictBtn.disabled = false;
                resultSection.style.display = 'none';

                // 滚动到预览区域
                previewSection.scrollIntoView({ behavior: 'smooth', block: 'center' });
            };
            reader.readAsDataURL(file);

            showMessage('图像上传成功！点击"开始智能诊断"进行分析。', 'success');
        }

        // 预测函数
        async function predict() {
            if (!selectedFile) {
                showMessage('请先上传图像！');
                return;
            }

            hideMessages();
            predictBtn.disabled = true;
            predictBtn.textContent = '🔍 分析中...';
            loading.style.display = 'block';
            resultSection.style.display = 'none';

            const formData = new FormData();
            formData.append('file', selectedFile);

            try {
                const response = await fetch('/predict', {
                    method: 'POST',
                    body: formData,
                    headers: {
                        'Accept': 'application/json'
                    }
                });

                const data = await response.json();

                if (data.success) {
                    displayResults(data);
                    showMessage('诊断完成！', 'success');
                } else {
                    showMessage('诊断失败: ' + (data.error || '未知错误'));
                }
            } catch (error) {
                console.error('预测错误:', error);
                showMessage('网络连接失败，请检查网络连接后重试');
            } finally {
                predictBtn.disabled = false;
                predictBtn.textContent = '🔍 开始智能诊断';
                loading.style.display = 'none';
            }
        }

        // 显示结果
        function displayResults(data) {
            // 主要预测结果
            document.getElementById('predictionLabel').textContent = data.prediction;
            document.getElementById('predictionConfidence').textContent =
                `置信度: ${(data.confidence * 100).toFixed(1)}%`;

            // Top-3 结果
            const top3Results = document.getElementById('top3Results');
            top3Results.innerHTML = '';

            data.top3.forEach((item, index) => {
                const div = document.createElement('div');
                div.className = 'top3-item';
                div.innerHTML = `
                    <span class="top3-rank">#${index + 1}</span>
                    <span class="top3-class">${item.class}</span>
                    <span class="top3-confidence">${(item.confidence * 100).toFixed(1)}%</span>
                `;

                // 添加动画效果
                div.style.opacity = '0';
                div.style.transform = 'translateY(20px)';
                top3Results.appendChild(div);

                // 延迟显示动画
                setTimeout(() => {
                    div.style.transition = 'all 0.5s ease';
                    div.style.opacity = '1';
                    div.style.transform = 'translateY(0)';
                }, index * 100);
            });

            resultSection.style.display = 'block';

            // 滚动到结果区域
            setTimeout(() => {
                resultSection.scrollIntoView({ behavior: 'smooth', block: 'center' });
            }, 300);
        }

        // 页面加载完成提示
        window.addEventListener('load', function() {
            showMessage('系统加载完成！请上传番茄叶片图像进行病害诊断。', 'success');
        });
    </script>
</body>
</html>
